services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cpd
      POSTGRES_PASSWORD: cpd_ci_password
      POSTGRES_DB: cpd_portal_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cpd -d cpd_portal_test"]
      interval: 5s
      timeout: 5s
      retries: 5
