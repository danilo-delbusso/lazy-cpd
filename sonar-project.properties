sonar.projectKey=Ricky-Stevens_CPD-Portal
sonar.organization=ricky-stevens
sonar.projectName=CPD Portal

sonar.sources=src
sonar.tests=src/test,e2e
sonar.test.inclusions=src/test/**,src/**/*.test.ts,src/**/*.test.tsx,src/**/*.integration.test.ts,e2e/**
sonar.sourceEncoding=UTF-8

sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.coverage.exclusions=\
  src/test/**,\
  e2e/**,\
  src/types/**,\
  src/app/**/page.tsx,\
  src/app/**/layout.tsx,\
  src/app/**/loading.tsx,\
  src/app/**/error.tsx,\
  src/app/**/*-client.tsx,\
  src/app/(public)/public-layout-context.tsx,\
  src/components/**/*.tsx,\
  src/stores/**,\
  src/lib/db/schema.ts,\
  src/lib/db/index.ts,\
  src/proxy.ts
sonar.cpd.exclusions=src/test/**,e2e/**
sonar.exclusions=drizzle/migrations/**,src/test/**,src/**/*.integration.test.ts
