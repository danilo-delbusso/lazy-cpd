services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cpd
      POSTGRES_PASSWORD: cpd_dev_password
      POSTGRES_DB: cpd_portal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cpd -d cpd_portal"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
