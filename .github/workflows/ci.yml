name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql://cpd:cpd_ci_password@localhost:5432/cpd_portal_test
  JWT_SECRET: ci-test-secret-not-for-production
  ADMIN_PASSWORD: ci-test-password-not-for-production
  SEED_MODE: ci

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run test:unit

  # Runs the full test suite (unit + integration) against a real PostgreSQL
  # instance and produces a merged coverage report.
  unit-tests-db:
    name: Unit & Integration Tests (with DB)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cpd
          POSTGRES_PASSWORD: cpd_ci_password
          POSTGRES_DB: cpd_portal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cpd -d cpd_portal_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run db:generate
      - run: bun run db:migrate
      - run: bun run db:seed
      - run: bun run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cpd
          POSTGRES_PASSWORD: cpd_ci_password
          POSTGRES_DB: cpd_portal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cpd -d cpd_portal_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium firefox
      - run: bun run db:generate
      - run: bun run db:migrate
      - run: bun run db:seed
      - run: bun run build
      - name: Prepare standalone server
        run: cp -r .next/static .next/standalone/.next/static && cp -r public .next/standalone/public
      - name: Generate missing visual snapshots
        run: bunx playwright test --update-snapshots=missing e2e/visual/
      - run: bun run e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
