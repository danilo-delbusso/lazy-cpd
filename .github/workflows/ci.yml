name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql://cpd:cpd_ci_password@localhost:5432/cpd_portal_test
  JWT_SECRET: ci-test-secret-not-for-production
  ADMIN_PASSWORD: ci-test-password-not-for-production
  SEED_MODE: ci

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run test:unit
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit
          path: coverage/coverage-final.json
          retention-days: 1

  # Runs integration tests against a real PostgreSQL instance.
  integration-tests:
    name: Integration Tests (with DB)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cpd
          POSTGRES_PASSWORD: cpd_ci_password
          POSTGRES_DB: cpd_portal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cpd -d cpd_portal_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run db:generate
      - run: bun run db:migrate
      - run: bun run db:seed
      - run: bun run test:integration
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-integration
          path: coverage-integration/coverage-final.json
          retention-days: 1

  # Merges unit + integration coverage and runs SonarCloud analysis.
  # SonarCloud gates on bugs, vulnerabilities, security hotspots, code smells.
  # Coverage is for trending/display — thresholds are enforced by Vitest.
  sonarcloud:
    name: SonarCloud Analysis
    needs: [unit-tests, integration-tests]
    runs-on: ubuntu-latest
    if: always() && needs.unit-tests.result == 'success' && needs.integration-tests.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: coverage-artifacts/unit
      - uses: actions/download-artifact@v4
        with:
          name: coverage-integration
          path: coverage-artifacts/integration
      - name: Merge coverage reports
        run: |
          mkdir -p coverage-merged
          cp coverage-artifacts/unit/coverage-final.json coverage-merged/unit.json
          cp coverage-artifacts/integration/coverage-final.json coverage-merged/integration.json
          npx nyc report --temp-dir coverage-merged -r lcov --report-dir coverage-merged
      - uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cpd
          POSTGRES_PASSWORD: cpd_ci_password
          POSTGRES_DB: cpd_portal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cpd -d cpd_portal_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium firefox
      - run: bun run db:generate
      - run: bun run db:migrate
      - run: bun run db:seed
      - run: bun run build
      - name: Prepare standalone server
        run: cp -r .next/static .next/standalone/.next/static && cp -r public .next/standalone/public
      - run: bun run e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
